<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>冠脉介入术前智能分析平台 Demo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
    /* 背景图 */
    body {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        margin: 0;
        background: url('https://images.unsplash.com/photo-1581091215360-88822f024e97?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5MTI2NzR8MHwxfHNlYXJjaHwxfHxjYXJkaWFjJTIwaW1hZ2V8ZW58MHx8fHwxNjk4NjM1MjU0&ixlib=rb-4.0.3&q=80&w=1920') no-repeat center center fixed;
        background-size: cover;
        color: #333;
    }

    header {
        text-align: center;
        padding: 40px 20px;
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(5px);
        border-radius: 0 0 20px 20px;
        margin-bottom: 20px;
    }
    header h1 { font-size: 2.4rem; margin-bottom: 10px; color: #004080; }
    header p { font-size: 1.1rem; color: #0072ff; }

    /* 导航 */
    .nav-tabs .nav-link {
        color: #004080;
        border: none;
        font-weight: 500;
        transition: all 0.3s;
    }
    .nav-tabs .nav-link.active {
        color: #fff;
        background: #0072ff;
        border-radius: 12px 12px 0 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* 模块卡片 */
    .module {
        display: none;
        padding: 30px;
        margin-top: 20px;
        background: rgba(255,255,255,0.85);
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        transition: all 0.3s;
    }
    .module.active { display: block; }

    /* 按钮 */
    .btn-custom {
        background: linear-gradient(45deg,#00c6ff,#0072ff);
        border: none;
        color: white;
        font-weight: 600;
        border-radius: 25px;
        padding: 10px 25px;
        transition: all 0.3s;
    }
    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    /* CTA 3D 占位 */
    #cta3d {
        width: 100%;
        height: 400px;
        background: linear-gradient(135deg,#00c6ff,#0072ff);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: rgba(255,255,255,0.9);
        box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
    }

    /* 风险图表卡片 */
    .chart-card {
        background: rgba(255,255,255,0.85);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        margin-top: 20px;
    }

    /* 图标样式 */
    .icon-circle {
        width: 50px;
        height: 50px;
        background: linear-gradient(45deg,#00c6ff,#0072ff);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        color: white;
        font-size: 20px;
        margin-right: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* 对话模块 */
    #chatModule {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 12px;
        background: rgba(255,255,255,0.95);
        margin-top: 15px;
    }
    .chat-message { margin-bottom: 12px; display: flex; }
    .chat-message.user { justify-content: flex-end; }
    .chat-bubble {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 20px;
        line-height: 1.4;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .chat-message.user .chat-bubble { background: #0072ff; color: white; border-bottom-right-radius: 0; }
    .chat-message.bot .chat-bubble { background: #e0f0ff; color: #004080; border-bottom-left-radius: 0; }
</style>
</head>
<body>

<header>
    <h1>冠脉介入术前智能分析平台 Demo</h1>
    <p>模拟“一站式 CTA”分析与风险预警流程</p>
</header>

<div class="container">
    <!-- 导航 -->
    <ul class="nav nav-tabs justify-content-center">
        <li class="nav-item"><a class="nav-link active" data-target="data-import"><i class="fas fa-upload"></i> 数据导入</a></li>
        <li class="nav-item"><a class="nav-link" data-target="smart-analysis"><i class="fas fa-brain"></i> 智能分析</a></li>
        <li class="nav-item"><a class="nav-link" data-target="risk-assessment"><i class="fas fa-exclamation-triangle"></i> 风险评估</a></li>
        <li class="nav-item"><a class="nav-link" data-target="visualization"><i class="fas fa-3d-cube"></i> 可视化展示</a></li>
        <li class="nav-item"><a class="nav-link" data-target="chat"><i class="fas fa-comment-dots"></i> 对话助手</a></li>
    </ul>

    <!-- 数据导入 -->
    <div id="data-import" class="module active">
        <h3><span class="icon-circle"><i class="fas fa-upload"></i></span> 数据导入</h3>
        <input type="file" class="form-control mb-3" multiple>
        <button class="btn btn-custom" onclick="alert('数据导入成功（模拟）')">导入数据</button>
    </div>

    <!-- 智能分析 -->
    <div id="smart-analysis" class="module">
        <h3><span class="icon-circle"><i class="fas fa-brain"></i></span> 智能分析</h3>
        <button class="btn btn-custom mb-3" onclick="startAnalysis()">开始分析</button>
        <div id="analysis-status">状态：等待分析...</div>
    </div>

    <!-- 风险评估 -->
    <div id="risk-assessment" class="module">
        <h3><span class="icon-circle"><i class="fas fa-exclamation-triangle"></i></span> 风险评估</h3>
        <div class="chart-card">
            <canvas id="riskChart"></canvas>
        </div>
    </div>

    <!-- 可视化 -->
    <div id="visualization" class="module">
        <h3><span class="icon-circle"><i class="fas fa-3d-cube"></i></span> CTA 三维可视化</h3>
        <div id="cta3d">[三维 CTA 占位]</div>
    </div>

    <!-- 对话助手 -->
    <div id="chat" class="module">
        <h3><span class="icon-circle"><i class="fas fa-comment-dots"></i></span> 智能对话助手</h3>
        <div id="chatModule"></div>
        <div class="input-group mt-2">
            <input type="text" id="chatInput" class="form-control" placeholder="输入问题，例如：病变风险如何？">
            <button class="btn btn-custom" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> 发送</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    // 导航切换
    document.querySelectorAll('.nav-link').forEach(link=>{
        link.addEventListener('click', ()=>{
            document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
            document.getElementById(link.dataset.target).classList.add('active');
            link.classList.add('active');
        });
    });

    // 模拟分析
    function startAnalysis() {
        const status = document.getElementById('analysis-status');
        status.textContent = '状态：分析中...';
        setTimeout(()=>{
            status.textContent = '状态：分析完成！';
            alert('分析完成（模拟）');
        }, 1500);
    }

    // 风险评估图表
    const ctx = document.getElementById('riskChart').getContext('2d');
    const riskChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['低风险', '中风险', '高风险'],
            datasets: [{
                label: '风险等级占比',
                data: [40, 35, 25],
                backgroundColor: ['#28a745','#ffc107','#dc3545']
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // 聊天功能
    

    async function sendMessage() {
        const text = chatInput.value;
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                question: text,
                image_path: window.currentImagePath
            })
        });
        const data = await res.json();
        // 显示 data.answer
    }

    async function loadSlice(path, slice=16) {
        const res = await fetch(`/api/visualize?path=${path}&slice=${slice}`);
        const data = await res.json();
        document.getElementById("cta3d").innerHTML =
            `<img src="${data.image_url}" style="width:100%">`;
    }

    async function uploadNpy(file) {
        const form = new FormData();
        form.append("file", file);

        const res = await fetch("/api/upload", {
            method: "POST",
            body: form
        });
        return await res.json();
    }



</script>
</body>
</html>

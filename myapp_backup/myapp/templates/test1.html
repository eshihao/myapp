<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>冠脉介入术前智能分析平台 Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; margin: 0; background: url('https://images.unsplash.com/photo-1581091215360-88822f024e97?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5MTI2NzR8MHwxfHNlYXJjaHwxfHxjYXJkaWFjJTIwaW1hZ2V8ZW58MHx8fHwxNjk4NjM1MjU0&ixlib=rb-4.0.3&q=80&w=1920') no-repeat center center fixed; background-size: cover; color: #333; }
        header { text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.6); backdrop-filter: blur(5px); border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        header h1 { font-size: 2.4rem; margin-bottom: 10px; color: #004080; }
        header p { font-size: 1.1rem; color: #0072ff; }
        .chat-message { margin-bottom: 12px; display: flex; }
        .chat-message.user { justify-content: flex-end; }
        .chat-bubble { max-width: 70%; padding: 10px 15px; border-radius: 20px; background: #0072ff; color: white; }
        .chat-message.bot .chat-bubble { background: #e0f0ff; color: #004080; }
    </style>
</head>
<body>

<header>
    <h1>冠脉介入术前智能分析平台 Demo</h1>
    <p>模拟“一站式 CTA”分析与风险预警流程</p>
</header>

<div class="container">
    <div id="chatModule"></div>
    <div class="input-group mt-2">
        <input type="text" id="chatInput" class="form-control" placeholder="输入问题，例如：病变风险如何？">
        <button class="btn btn-primary" onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script>
    function sendMessage() {
        const userMessage = document.getElementById('chatInput').value;
        if (userMessage.trim() === "") return;
        
        // 用户消息显示
        const chatModule = document.getElementById('chatModule');
        chatModule.innerHTML += `
            <div class="chat-message user">
                <div class="chat-bubble">${userMessage}</div>
            </div>
        `;

        // 清空输入框
        document.getElementById('chatInput').value = "";

        // 发送请求到后端
        $.ajax({
            url: "/chat",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ message: userMessage }),
            success: function(response) {
                const botMessage = response.bot_message;
                chatModule.innerHTML += `
                    <div class="chat-message bot">
                        <div class="chat-bubble">${botMessage}</div>
                    </div>
                `;
                chatModule.scrollTop = chatModule.scrollHeight;
            }
        });
    }
</script>
</body>
</html>
